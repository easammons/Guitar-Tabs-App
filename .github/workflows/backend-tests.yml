name: Backend Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [dev, main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('server/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r server/requirements.txt

      - name: Run test_parser
        working-directory: server
        run: python tests/test_parser.py

      - name: Run test_converter
        working-directory: server
        run: python tests/test_converter.py

      - name: Run test_chord_voicer
        working-directory: server
        run: python tests/test_chord_voicer.py

      - name: Run test_chord_integration
        working-directory: server
        run: python tests/test_chord_integration.py

      - name: Run test_multistaff
        working-directory: server
        run: python tests/test_multistaff.py
